# Experience Bank — source of truth for claim-based renders.
#
# Each claim is confidentiality-safe: only "Atomic Object" is named; clients are described by domain.
# Renders (LinkedIn / resume / JD-tailored) SELECT and lightly rephrase from here — they never invent
# tech or metrics not present in a claim. See ../specs/experience-bank.md and
# ../specs/render-rules-reference.md.
#
# Fields:
#   id            stable slug
#   project       internal codename (NOT for output)
#   domain        public-safe domain description (use this in renders)
#   themes        [technical leadership | system design | cross-domain adaptability | reliability | growth | devops/CI | i18n | testing]
#   tech          named technologies from the source (the recruiter keywords)
#   scope         IC | owned-feature | co-tech-lead
#   strength      featured | solid | filler   (Jacob's call — these are proposed defaults, adjust freely)
#   hook          true if it's a "I need to talk to this person" problem
#   keyword_rich  recruiter-facing phrasing (anonymized source)
#   plain_language  plain-English version (filled for featured/hook; "" = to write during curation)

meta:
  owner: Jacob Williams
  company: Atomic Object
